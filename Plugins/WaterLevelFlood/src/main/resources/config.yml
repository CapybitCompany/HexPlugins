# ============================================
# WaterLevelFlood - Konfiguracja
# Plugin do eventu Titanic - podnoszenie poziomu wody
# ============================================

# Nazwa świata, w którym działa flood
world: "world"

# Obszar zalewania (AABB - prostokąt 3D)
# Woda będzie stawiana TYLKO wewnątrz tego obszaru
region:
  x1: -100
  z1: -100
  x2: 100
  z2: 100
  # Minimalny Y od którego zaczyna się zalewanie (dno)
  y-min: 50
  # Maksymalny Y do którego woda może sięgnąć (sufit)
  y-max: 90

# Poziom Y wody na starcie (przed rozpoczęciem eventu)
# Wszystko poniżej tego poziomu zostanie wypełnione wodą natychmiast na /flood start
start-water-level: 55

# O ile bloków ma się podnieść woda w trakcie eventu
# Końcowy poziom = start-water-level + rise-blocks
rise-blocks: 20

# Czas trwania podnoszenia wody w sekundach (7-10 minut zalecane)
duration-seconds: 480

# Ile blokow przetwarzac w jednym TIKU serwera podczas stawiania warstwy wody
# Im wiecej, tym szybciej stawia warstwe, ale moze lagowac
# Zalecane: 400-2000
blocks-per-tick: 1000

# Bloki, które woda może zastąpić (oprócz powietrza)
# Drzwi, trawy itp. będą niszczone przez wodę
replaceable-blocks:
  - "AIR"
