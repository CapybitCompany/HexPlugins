name: HexRanking
version: 1.0.1
main: hex.ranking.HexRanking
api-version: "1.21"

depend:
  - HexCore

softdepend:
  - PlaceholderAPI

commands:
  dajpunkt:
    usage: "/dajpunkt <tabela: global|season> <gracz> <ilosc>"
    description: Dodaje punkty graczowi
    permission: hex.ranking.admin
  dajpunktevent:
    usage: "/dajpunktevent [gracz1 gracz2 ...]"
    description: Przyznaje punkt eventowy (season + global) online graczom
    permission: hex.ranking.admin
  odejmijpunkt:
    usage: "/odejmijpunkt <tabela: global|season> <gracz> <ilosc>"
    description: Odejmuje punkty graczowi
    permission: hex.ranking.admin
  punkty:
    usage: "/punkty <gracz> <tabela: global|season>"
    description: Pokazuje punkty gracza z wybranej tabeli
    permission: hex.ranking.view
  ranking:
    usage: "/ranking top [limit]"
    description: Pokazuje ranking top
    aliases:
      - hexranking
    permission: hex.ranking.view

permissions:
  # Dev-friendly defaults without LuckPerms; LP can still override per group/user.
  hex.ranking.admin:
    description: Pozwala zarzadzac punktami (/dajpunkt, /odejmijpunkt)
    default: op
  hex.ranking.view:
    description: Pozwala sprawdzac punkty i ranking (/punkty, /ranking)
    default: op
